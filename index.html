<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANI RADAR PRO</title>
    <style>
        :root {
            --bg: #05070a;
            --blue: #3b82f6;
            --card: #111827;
            --text: #ffffff;
            --accent: #2563eb;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .header { text-align: center; margin: 40px 0 30px; }
        h1 { 
            color: var(--blue); 
            font-size: clamp(28px, 10vw, 42px); 
            font-weight: 900; 
            font-style: italic; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .subtitle { 
            font-size: 11px; 
            letter-spacing: 5px; 
            color: #4b5563; 
            text-transform: uppercase; 
            margin-top: 8px;
            font-weight: bold;
        }
        .main-card {
            background: var(--card);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 35px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .scan-btn {
            background: linear-gradient(135deg, var(--blue), var(--accent));
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: all 0.2s ease;
        }
        .scan-btn:active { transform: scale(0.96); opacity: 0.9; }
        .scan-btn:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; }
        
        #results {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 25px;
            padding: 20px;
            display: none;
            text-align: left;
            font-size: 15px;
            line-height: 1.7;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: pre-wrap;
            color: #e2e8f0;
            animation: fadeIn 0.5s ease;
        }
        .loader {
            display: none;
            margin-top: 20px;
            color: var(--blue);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #10b981;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KJANI RADAR</h1>
        <div class="subtitle">Sektor Hannover</div>
    </div>

    <div class="main-card">
        <div style="margin-bottom: 20px; font-size: 12px; color: #64748b;">
            <span class="status-dot"></span> System Online
        </div>
        <button id="scanBtn" class="scan-btn" onclick="startScan()">Radar Starten</button>
        <div id="loader" class="loader">Scanner kalibriert...</div>
        <div id="results"></div>
    </div>

    <script>
        async function startScan() {
            const btn = document.getElementById('scanBtn');
            const loader = document.getElementById('loader');
            const out = document.getElementById('results');
            
            // Dein Key für den Hannover Scanner
            const apiKey = "AIzaSyC9ZXRbkyoXTBeYtO8JaV78Uw-fPZQ92rU";

            btn.disabled = true;
            btn.innerText = "SCAN LÄUFT...";
            loader.style.display = "block";
            out.style.display = "none";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Suche 5 aktuelle Reinigungsaufträge, Firmen oder Ausschreibungen in Hannover. Liste Stadtteil, Art der Reinigung und Name der Firma auf."
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Radar gestört. Bitte versuche es gleich noch einmal.";
                
                out.innerText = text;
                out.style.display = "block";
            } catch (err) {
                out.innerText = "VERBINDUNGSFEHLER: Bitte Internet prüfen, Boss!";
                out.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Radar Starten";
                loader.style.display = "none";
            }
        }
    </script>

</body>
</
