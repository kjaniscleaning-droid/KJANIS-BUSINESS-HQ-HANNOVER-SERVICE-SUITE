<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ilirya Business System</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
  transition: 0.3s;
}

.dark {
  background: #0f172a;
  color: white;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.dark .card {
  background: #1e293b;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: linear-gradient(to right,#1e3c72,#d4af37);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

.item {
  padding: 10px;
  background:#eef2f7;
  margin-top:10px;
  border-radius:8px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.eagle {
  font-size: 40px;
}
</style>
</head>

<body>

<div class="header">
  <div class="eagle">🦅</div>
  <h2>Ilirya Business System</h2>
  <button onclick="toggleMode()">💡 Licht an / aus</button>
</div>

<div class="card">
<h3>🔍 Kunden finden</h3>
<button onclick="search('Hausverwaltung Hannover')">Hausverwaltung</button>
<button onclick="search('Immobilien Hannover')">Immobilien</button>
<button onclick="search('Büro Hannover')">Büros</button>
<button onclick="search('Arztpraxis Hannover')">Praxen</button>
</div>

<div class="card">
<h3>📩 Firma anschreiben</h3>
<input id="firma" placeholder="Firma eingeben">
<button onclick="generate()">🔥 Angebot erstellen</button>
<textarea id="text" rows="10"></textarea>
<button onclick="sendMail()">📧 Email öffnen</button>
<button onclick="saveFirma()">💾 Speichern</button>
</div>

<div class="card">
<h3>📋 Firmen Übersicht</h3>
<div id="liste"></div>
</div>

<div class="card">
<h3>🤖 Antwort Hilfe</h3>
<input id="frage" placeholder="Kundenfrage eingeben">
<button onclick="generateAnswer()">Antwort erstellen</button>
<textarea id="antwort" rows="8"></textarea>
<button onclick="sendAnswer()">📤 Antwort senden</button>
</div>

<script>

function toggleMode() {
  document.body.classList.toggle("dark");
}

function search(query) {
  window.open("https://www.google.com/search?q=" + encodeURIComponent(query));
}

function generate() {
  let firma = document.getElementById("firma").value;

  let text = `Betreff: Zusammenarbeit im Bereich Reinigung

Guten Tag ${firma},

mein Name ist Kjani Zharki von Kjanis Cleaning aus Hannover.

Ich unterstütze Unternehmen zuverlässig bei:

• Treppenhausreinigung  
• Büroreinigung  
• Unterhaltsreinigung  

Aktuell habe ich freie Kapazitäten und kann kurzfristig starten.

Ich arbeite sauber, zuverlässig und langfristig.

📞 +49 152 15787871

Ich freue mich auf Ihre Rückmeldung.

Mit freundlichen Grüßen  
Kjani Zharki  
Kjanis Cleaning`;

  document.getElementById("text").value = text;
}

function sendMail() {
  let body = document.getElementById("text").value;
  window.location.href = "mailto:?subject=Reinigung Angebot&body=" + encodeURIComponent(body);
}

let firmen = JSON.parse(localStorage.getItem("firmen")) || [];

function saveFirma() {
  let name = document.getElementById("firma").value;
  if (!name || firmen.includes(name)) return;

  firmen.push(name);
  localStorage.setItem("firmen", JSON.stringify(firmen));
  render();
}

function render() {
  let box = document.getElementById("liste");
  box.innerHTML = "";
  firmen.forEach(f => {
    box.innerHTML += `<div class="item">${f}</div>`;
  });
}

function generateAnswer() {
  let frage = document.getElementById("frage").value.toLowerCase();
  let text = "";

  if (frage.includes("preis")) {
    text = "Die Kosten hängen vom Objekt ab. Gerne besichtige ich alles und mache Ihnen ein Angebot.";
  } else if (frage.includes("wann")) {
    text = "Ich habe aktuell freie Kapazitäten und kann kurzfristig starten.";
  } else {
    text = "Vielen Dank für Ihre Nachricht. Gerne bespreche ich alles persönlich mit Ihnen.";
  }

  document.getElementById("antwort").value = text;
}

function sendAnswer() {
  let body = document.getElementById("antwort").value;
  window.location.href = "mailto:?subject=Antwort&body=" + encodeURIComponent(body);
}

render();

</script>

</body>
</html>
