<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANI RADAR PRO | HANNOVER</title>
    <style>
        :root {
            --bg: #020408;
            --blue-primary: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.4);
            --card-bg: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Hintergrund-Effekt */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020408 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--blue-primary);
            font-size: clamp(32px, 10vw, 48px);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 25px var(--blue-glow);
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .radar-unit {
            background: var(--card-bg);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 40px;
            padding: 40px 25px;
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        /* Radar-Scanner-Animation im Hintergrund */
        .radar-unit::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(59, 130, 246, 0.05), transparent 30%);
            animation: rotate 4s linear infinite;
            pointer-events: none;
            display: none;
        }

        .scanning .radar-unit::after { display: block; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 100px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            color: var(--text-dim);
        }

        .main-button {
            background: linear-gradient(135deg, var(--blue-primary), #2563eb);
            color: white;
            border: none;
            width: 100%;
            padding: 24px;
            border-radius: 24px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 20px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        .main-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .main-button:active {
            transform: translateY(1px) scale(0.98);
        }

        .main-button:disabled {
            background: #1e293b;
            color: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #results-container {
            margin-top: 35px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 25px;
            text-align: left;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }

        .result-title {
            color: var(--blue-primary);
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 4px;
            display: block;
        }

        .result-detail {
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.5;
        }

        .loader {
            display: none;
            margin-top: 25px;
            text-align: center;
        }

        .loader-text {
            font-size: 12px;
            color: var(--blue-primary);
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 15px;
            border-radius: 15px;
            font-size: 13px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="header">
            <h1>KJANI RADAR</h1>
            <div class="subtitle">Mission Hannover</div>
        </div>

        <div class="radar-unit">
            <div class="status-display">
                <div class="status-dot"></div>
                <div class="status-text">System Online</div>
            </div>
            
            <button id="scanBtn" class="main-button" onclick="startRadarScan()">Radar Starten</button>
            
            <div id="loader" class="loader">
                <div class="loader-text">Sektor Hannover wird gescannt...</div>
            </div>

            <div id="errorBox" class="error-box"></div>
            
            <div id="results-container"></div>
        </div>
    </div>

    <script>
        async function startRadarScan() {
            const btn = document.getElementById('scanBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results-container');
            const errorBox = document.getElementById('errorBox');
            const app = document.getElementById('app');
            
            // API Key
            const apiKey = "AIzaSyC9ZXRbkyoXTBeYtO8JaV78Uw-fPZQ92rU";

            // UI Zustand setzen
            btn.disabled = true;
            btn.innerText = "Scanning...";
            loader.style.display = "block";
            results.style.display = "none";
            errorBox.style.display = "none";
            app.classList.add('scanning');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Suche 5 aktuelle, konkrete Reinigungsaufträge, Ausschreibungen oder Firmen mit Reinigungsbedarf in Hannover. Formatiere die Antwort als klare Liste mit 'STADTTEIL', 'AUFGABE' und 'FIRMA/QUELLE'. Sei professionell."
                            }]
                        }]
                    })
                });

                if (!response.ok) throw new Error('Verbindungsfehler zum Satelliten.');

                const data = await response.json();
                const content = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (content) {
                    // Einfache Formatierung des Textes für die Anzeige
                    const formattedText = content.split('\n').filter(line => line.trim() !== '').map(line => {
                        return `<div class="result-item"><span class="result-detail">${line}</span></div>`;
                    }).join('');
                    
                    results.innerHTML = formattedText;
                    results.style.display = "block";
                } else {
                    throw new Error('Keine Daten empfangen.');
                }
            } catch (err) {
                errorBox.innerText = "RADAR-FEHLER: " + err.message + "\nBitte prüfe deine Internetverbindung, Boss!";
                errorBox.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Radar Starten";
                loader.style.display = "none";
                app.classList.remove('scanning');
            }
        }
    </script>

</
