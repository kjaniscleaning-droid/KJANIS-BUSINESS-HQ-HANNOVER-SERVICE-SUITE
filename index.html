<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJANIS HQ</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 20px;
}
input, button {
  padding: 10px;
  margin: 10px;
  width: 80%;
}
.card {
  background: #111827;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>KJANIS HQ</h1>
<p id="status">Verbinde...</p>

<div>
  <input id="name" placeholder="Kunde">
  <input id="value" placeholder="Betrag €" type="number">
  <button onclick="saveJob()">Speichern</button>
</div>

<h2>Jobs</h2>
<div id="jobs"></div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAPaLWV3QaIZOBdN0dzgB_9BIwEtNZM9BU",
  authDomain: "kjani-6a706.firebaseapp.com",
  projectId: "kjani-6a706",
  storageBucket: "kjani-6a706.firebasestorage.app",
  messagingSenderId: "62503034041",
  appId: "1:62503034041:web:8eec81d1a96f38b8148f68"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;

// 🔐 LOGIN
auth.signInAnonymously().then(res => {
  user = res.user;
  document.getElementById("status").innerText = "✅ Verbunden";
  loadJobs();
}).catch(err => {
  document.getElementById("status").innerText = "❌ Fehler";
  console.error(err);
});

// 💾 JOB SPEICHERN
function saveJob() {
  const name = document.getElementById("name").value;
  const value = document.getElementById("value").value;

  if (!name || !value) {
    alert("Bitte ausfüllen");
    return;
  }

  db.collection("artifacts")
    .doc("kjanis-hq-v45")
    .collection("users")
    .doc(user.uid)
    .collection("jobs")
    .add({
      name: name,
      val: Number(value),
      date: new Date().toISOString()
    });

  document.getElementById("name").value = "";
  document.getElementById("value").value = "";
}

// 🔄 DATEN LADEN
function loadJobs() {
  db.collection("artifacts")
    .doc("kjanis-hq-v45")
    .collection("users")
    .doc(user.uid)
    .collection("jobs")
    .orderBy("date", "desc")
    .onSnapshot(snapshot => {

      const container = document.getElementById("jobs");
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <b>${data.name}</b><br>
          € ${data.val}
        `;

        container.appendChild(div);
      });
    });
}

</script>

</body>
</
