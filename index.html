<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kjanis Business V2</title>

<style>
body {
  font-family: Arial;
  background: #f8fafc;
  color: #0f172a;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
  color: #1e3a8a;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #1e3a8a, #d4af37);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}

.item {
  background: #f1f5f9;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border-left: 5px solid #d4af37;
}
</style>
</head>

<body>

<div class="card">
  <h2>💼 Kjanis Business</h2>
</div>

<div class="card">
  <input id="name" placeholder="Kunde / Auftrag">
  <input id="price" placeholder="Betrag €">
  <button onclick="save()">Speichern</button>
</div>

<div class="card">
  <h3>📋 Aufträge</h3>
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function save() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if (!name || !price) return;

  data.push({ name, price });
  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";

  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    list.innerHTML += `
      <div class="item">
        <b>${d.name}</b><br>
        ${d.price} €
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
