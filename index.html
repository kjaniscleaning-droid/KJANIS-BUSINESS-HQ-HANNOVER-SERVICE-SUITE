<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANIS HQ | Ultimate V16.5</title>
    
    <!-- Tailwind & UI Performance -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08); }
        .nav-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn:active { transform: scale(0.9); }
        #root { height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        // --- Firebase Config & App ID ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "github-fallback" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kjanis-hq-v16';

        // --- Icons ---
        const IconStats = () => React.createElement('svg', { width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5" }, 
            React.createElement('line', { x1: "18", y1: "20", x2: "18", y2: "10" }),
            React.createElement('line', { x1: "12", y1: "20", x2: "12", y2: "4" }),
            React.createElement('line', { x1: "6", y1: "20", x2: "6", y2: "14" })
        );
        const IconPlus = () => React.createElement('svg', { width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5" },
            React.createElement('circle', { cx: "12", cy: "12", r: "10" }),
            React.createElement('line', { x1: "12", y1: "8", x2: "12", y2: "16" }),
            React.createElement('line', { x1: "8", y1: "12", x2: "16", y2: "12" })
        );
        const IconRadar = () => React.createElement('svg', { width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5" },
            React.createElement('circle', { cx: "12", cy: "12", r: "9" }),
            React.createElement('path', { d: "M12 12l3 3" }), React.createElement('path', { d: "M12 3v3" }), React.createElement('path', { d: "M12 18v3" })
        );
        const IconPartner = () => React.createElement('svg', { width: "24", height: "24", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5" },
            React.createElement('path', { d: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" }),
            React.createElement('circle', { cx: "9", cy: "7", r: "4" })
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dash');
            const [privacyMode, setPrivacyMode] = useState(false);
            const [notification, setNotification] = useState(null);
            const [stats, setStats] = useState({ own: 0, prov: 0 });
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            const [radar, setRadar] = useState([]);
            
            // UI State
            const [form, setForm] = useState({ name: '', val: '', type: 'own', partnerId: '' });
            const [pForm, setPForm] = useState({ name: '', email: '' });
            const printRef = useRef();

            const notify = (m) => { setNotification(m); setTimeout(() => setNotification(null), 3000); };
            const formatMoney = (v) => privacyMode ? "••••,•• €" : (v || 0).toLocaleString('de-DE', { minimumFractionDigits: 2 }) + " €";

            useEffect(() => {
                const fbApp = initializeApp(firebaseConfig);
                const auth = getAuth(fbApp);
                const db = getFirestore(fbApp);

                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, u => {
                    setUser(u);
                    if (u) {
                        const path = `artifacts/${appId}/users/${u.uid}`;
                        onSnapshot(collection(db, `${path}/partners`), s => {
                            setPartners(s.docs.map(d => ({id: d.id, ...d.data()})));
                        });
                        onSnapshot(collection(db, `${path}/jobs`), s => {
                            const list = s.docs.map(d => ({id: d.id, ...d.data()}));
                            setJobs(list);
                            let o = 0, p = 0;
                            list.forEach(j => {
                                if(j.type === 'own') o += Number(j.val);
                                else p += (Number(j.val) * 0.3);
                            });
                            setStats({ own: o, prov: p });
                        });
                    }
                });
            }, []);

            const handleSave = async () => {
                if(!form.name || !form.val) return notify("⚠️ Daten fehlen!");
                const fbApp = initializeApp(firebaseConfig);
                const db = getFirestore(fbApp);
                await addDoc(collection(db, `artifacts/${appId}/users/${user.uid}/jobs`), {
                    ...form, val: Number(form.val), date: new Date().toISOString()
                });
                setForm({ name: '', val: '', type: 'own', partnerId: '' });
                setActiveTab('dash');
                notify("✅ Cloud-Save erfolgreich");
            };

            const addPartner = async () => {
                if(!pForm.name) return notify("⚠️ Name fehlt!");
                const fbApp = initializeApp(firebaseConfig);
                const db = getFirestore(fbApp);
                await addDoc(collection(db, `artifacts/${appId}/users/${user.uid}/partners`), pForm);
                setPForm({ name: '', email: '' });
                notify("🤝 Partner registriert");
            };

            return React.createElement('div', { className: "min-h-screen pb-32" },
                notification && React.createElement('div', { className: "fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-2xl" }, notification),
                
                React.createElement('header', { className: "p-8 flex justify-between items-center" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-2xl font-black italic uppercase leading-none tracking-tighter" }, "KJANIS ", React.createElement('span', { className: "text-blue-500" }, "HQ")),
                        React.createElement('p', { className: "text-[7px] font-black text-slate-500 uppercase tracking-widest mt-1" }, "Ultimate Platinum V16.5")
                    ),
                    React.createElement('button', { onClick: () => setPrivacyMode(!privacyMode), className: "p-4 glass rounded-2xl border border-white/5 active:scale-90" }, privacyMode ? '🔒' : '👁️')
                ),

                React.createElement('main', { className: "max-w-md mx-auto px-6 space-y-6" },
                    activeTab === 'dash' && React.createElement('div', { className: "tab-content space-y-6" },
                        React.createElement('div', { className: "p-10 rounded-[2.5rem] glass shadow-2xl text-center relative overflow-hidden" },
                            React.createElement('div', { className: "absolute top-0 left-0 w-full h-1 bg-blue-500" }),
                            React.createElement('p', { className: "text-[9px] text-slate-500 font-black uppercase mb-2" }, "Profit (Online)"),
                            React.createElement('h2', { className: "text-5xl font-black italic tracking-tighter leading-none" }, formatMoney(stats.own + stats.prov))
                        ),
                        React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                            React.createElement('div', { className: "p-6 glass rounded-3xl text-center border-b-2 border-emerald-500" },
                                React.createElement('p', { className: "text-[8px] text-slate-500 font-bold mb-1" }, "EIGEN"),
                                React.createElement('p', { className: "text-emerald-400 font-black" }, formatMoney(stats.own))
                            ),
                            React.createElement('div', { className: "p-6 glass rounded-3xl text-center border-b-2 border-blue-500" },
                                React.createElement('p', { className: "text-[8px] text-slate-500 font-bold mb-1" }, "MARGE"),
                                React.createElement('p', { className: "text-blue-400 font-black" }, formatMoney(stats.prov))
                            )
                        ),
                        React.createElement('div', { className: "space-y-2" },
                            jobs.slice(0,3).map(j => React.createElement('div', { key: j.id, className: "p-4 glass rounded-2xl flex justify-between items-center" },
                                React.createElement('span', { className: "text-[10px] font-bold" }, j.name),
                                React.createElement('span', { className: "text-emerald-400 font-black text-xs" }, j.val, " €")
                            ))
                        )
                    ),

                    activeTab === 'plus' && React.createElement('div', { className: "tab-content glass p-8 rounded-[2.5rem] space-y-4" },
                        React.createElement('h3', { className: "text-center font-black text-blue-500 uppercase italic" }, "Buchung"),
                        React.createElement('input', { placeholder: "Kunde", className: "w-full bg-slate-900 p-5 rounded-2xl outline-none text-center", value: form.name, onChange: e => setForm({...form, name: e.target.value}) }),
                        React.createElement('input', { type: "number", placeholder: "Summe €", className: "w-full bg-slate-900 p-5 rounded-2xl outline-none text-center", value: form.val, onChange: e => setForm({...form, val: e.target.value}) }),
                        React.createElement('select', { className: "w-full bg-slate-900 p-5 rounded-2xl outline-none text-center text-slate-400", value: form.type, onChange: e => setForm({...form, type: e.target.value}) },
                            React.createElement('option', { value: "own" }, "Eigene Arbeit"),
                            React.createElement('option', { value: "partner" }, "Partner")
                        ),
                        React.createElement('button', { onClick: handleSave, className: "w-full bg-blue-600 py-6 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95" }, "Speichern")
                    ),

                    activeTab === 'radar' && React.createElement('div', { className: "tab-content space-y-4 text-center" },
                        React.createElement('div', { className: "p-8 glass rounded-[2.5rem]" },
                            React.createElement('h3', { className: "font-black text-blue-500 uppercase italic mb-4" }, "KI Markt-Scan"),
                            React.createElement('button', { onClick: () => notify("📡 Suche Hannover..."), className: "w-full bg-slate-800 py-4 rounded-xl font-black uppercase text-[10px]" }, "Scan Starten")
                        ),
                        React.createElement('p', { className: "text-slate-600 text-[10px] italic" }, "Warte auf Cloud-Signale...")
                    ),

                    activeTab === 'partners' && React.createElement('div', { className: "tab-content space-y-6" },
                        React.createElement('div', { className: "p-8 glass rounded-[2.5rem] space-y-4" },
                            React.createElement('h3', { className: "text-center font-black text-emerald-500 uppercase italic" }, "Partner-Pool"),
                            React.createElement('input', { placeholder: "Name", className: "w-full bg-slate-900 p-4 rounded-xl outline-none text-center", value: pForm.name, onChange: e => setPForm({...pForm, name: e.target.value}) }),
                            React.createElement('button', { onClick: addPartner, className: "w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-[10px]" }, "Hinzufügen")
                        ),
                        partners.map(p => React.createElement('div', { key: p.id, className: "p-5 glass rounded-2xl flex justify-between items-center" },
                            React.createElement('span', { className: "text-xs font-bold" }, p.name),
                            React.createElement('span', { className: "text-[8px] text-slate-500" }, "AKTIV")
                        ))
                    )
                ),

                React.createElement('nav', { className: "fixed bottom-10 left-8 right-8 glass rounded-[3rem] p-8 flex justify-around shadow-2xl z-40" },
                    React.createElement('button', { onClick: () => setActiveTab('dash'), className: `nav-btn ${activeTab === 'dash' ? 'text-blue-500 scale-125' : 'text-slate-600'}` }, React.createElement(IconStats, null)),
                    React.createElement('button', { onClick: () => setActiveTab('plus'), className: `nav-btn ${activeTab === 'plus' ? 'text-blue-500 scale-125' : 'text-slate-600'}` }, React.createElement(IconPlus, null)),
                    React.createElement('button', { onClick: () => setActiveTab('radar'), className: `nav-btn ${activeTab === 'radar' ? 'text-blue-500 scale-125' : 'text-slate-600'}` }, React.createElement(IconRadar, null)),
                    React.createElement('button', { onClick: () => setActiveTab('partners'), className: `nav-btn ${activeTab === 'partners' ? 'text-blue-500 scale-125' : 'text-slate-600'}` }, React.createElement(IconPartner, null))
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
