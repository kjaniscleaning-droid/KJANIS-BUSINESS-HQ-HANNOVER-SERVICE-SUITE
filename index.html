<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANIS HQ | V16.7 Universal</title>

    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase (optional) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #1e293b;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Initialisierung (optional)
        const config = window.__firebase_config
            ? JSON.parse(window.__firebase_config)
            : null;

        let db = null;
        try {
            if (config && !firebase.apps.length) {
                firebase.initializeApp(config);
                db = firebase.firestore();
            }
        } catch (e) {
            console.warn("Firebase nicht aktiv:", e);
        }

        // Icons
        const IconStats = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
        );

        const IconPlus = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
        );

        const IconRadar = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 12l3 3"/>
                <path d="M12 3v3"/>
                <path d="M12 18v3"/>
            </svg>
        );

        const IconPartner = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
            </svg>
        );

        const IconTrash = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M3 6h18"/>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dash');
            const [privacyMode, setPrivacyMode] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            const [stats, setStats] = useState({ own: 0, prov: 0 });
            const [notification, setNotification] = useState(null);

            // Lead Scanner States
            const [isScanning, setIsScanning] = useState(false);
            const [leads, setLeads] = useState([]);

            const notify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const formatMoney = (value) =>
                privacyMode ? "•••• €" : (value || 0).toLocaleString('de-DE') + " €";

            // Loader & LocalStorage
            useEffect(() => {
                const timer = setTimeout(() => {
                    const loader = document.getElementById('loader');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                }, 1500);

                const savedJobs = localStorage.getItem('kj_jobs');
                const savedPartners = localStorage.getItem('kj_partners');

                if (savedJobs) setJobs(JSON.parse(savedJobs));
                if (savedPartners) setPartners(JSON.parse(savedPartners));

                return () => clearTimeout(timer);
            }, []);

            // Stats berechnen
            useEffect(() => {
                let own = 0, prov = 0;
                jobs.forEach(job => {
                    if (job.type === 'own') own += Number(job.val);
                    else prov += Number(job.val) * 0.3;
                });
                setStats({ own, prov });
                localStorage.setItem('kj_jobs', JSON.stringify(jobs));
            }, [jobs]);

            useEffect(() => {
                localStorage.setItem('kj_partners', JSON.stringify(partners));
            }, [partners]);

            // Auftrag speichern
            const handleSaveJob = () => {
                const name = document.getElementById('n').value;
                const val = document.getElementById('v').value;
                const type = document.getElementById('t').value;

                if (!name || !val) {
                    notify("⚠️ Bitte alles ausfüllen!");
                    return;
                }

                const newJob = {
                    id: Date.now(),
                    name,
                    val: Number(val),
                    type,
                    date: new Date().toLocaleDateString('de-DE')
                };

                setJobs([...jobs, newJob]);
                notify("✅ Auftrag gespeichert!");
                setActiveTab('dash');

                document.getElementById('n').value = '';
                document.getElementById('v').value = '';

                if (db) {
                    db.collection('jobs').add(newJob).catch(() => {});
                }
            };

            // Partner hinzufügen
            const addPartner = () => {
                const name = document.getElementById('pn').value;
                const mail = document.getElementById('pm').value;

                if (!name || !mail) {
                    notify("⚠️ Daten fehlen!");
                    return;
                }

                setPartners([...partners, { id: Date.now(), name, mail }]);
                notify("🤝 Partner gelistet!");

                document.getElementById('pn').value = '';
                document.getElementById('pm').value = '';
            };

            // Lead Scanner
            const startScan = () => {
                if (isScanning) return;

                setIsScanning(true);
                setLeads([]);
                notify("📡 Scan gestartet...");

                setTimeout(() => {
                    const demoLeads = [
                        { id: 1, name: "Müller Gebäudeservice", city: "Hannover" },
                        { id: 2, name: "Autohaus Schmidt", city: "Hannover" },
                        { id: 3, name: "Bäckerei König", city: "Hannover" }
                    ];
                    setLeads(demoLeads);
                    setIsScanning(false);
                    notify("✅ 3 neue Leads gefunden!");
                }, 3000);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative p-6 pb-40">
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-2xl">
                            {notification}
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-10 pt-4">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter">
                                KJANIS <span className="text-blue-500">HQ</span>
                            </h1>
                            <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">
                                Universal Edition V16.7
                            </p>
                        </div>
                        <button
                            onClick={() => setPrivacyMode(!privacyMode)}
                            className="p-4 glass rounded-2xl"
                        >
                            {privacyMode ? '🔒' : '👁️'}
                        </button>
                    </header>

                    <main className="space-y-6">
                        {activeTab === 'dash' && (
                            <div className="space-y-6">
                                <div className="p-12 rounded-[3rem] glass text-center">
                                    <p className="text-[9px] text-slate-500 font-black uppercase mb-2">
                                        Gesamt-Profit
                                    </p>
                                    <h2 className="text-5xl font-black italic">
                                        {formatMoney(stats.own + stats.prov)}
                                    </h2>
                                </div>
                            </div>
                        )}

                        {activeTab === 'radar' && (
                            <div className="space-y-6 text-center">
                                <div className="p-10 glass rounded-[3rem]">
                                    <h3 className="font-black text-blue-500 uppercase italic mb-4">
                                        Lead-Radar
                                    </h3>
                                    <button
                                        onClick={startScan}
                                        disabled={isScanning}
                                        className={`w-full py-5 rounded-3xl font-black uppercase text-[10px] ${
                                            isScanning ? 'bg-slate-600' : 'bg-slate-800'
                                        }`}
                                    >
                                        {isScanning ? "Scanne..." : "Scan Hannover"}
                                    </button>
                                </div>

                                {isScanning && (
                                    <p className="text-slate-400 text-[10px] uppercase font-bold tracking-widest italic animate-pulse">
                                        Scanning for opportunities...
                                    </p>
                                )}

                                {!isScanning && leads.length > 0 && (
                                    <div className="space-y-3">
                                        <p className="text-[9px] font-black text-slate-600 uppercase">
                                            Gefundene Leads
                                        </p>
                                        {leads.map(lead => (
                                            <div key={lead.id} className="p-5 glass rounded-[2rem] text-left">
                                                <p className="text-[10px] font-black uppercase">{lead.name}</p>
                                                <p className="text-[8px] text-slate-500 mt-1">{lead.city}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-8 right-8 glass rounded-[3rem] p-6 flex justify-around">
                        <button onClick={() => setActiveTab('dash')} className="text-slate-600">
                            <IconStats />
                        </button>
                        <button onClick={() => setActiveTab('plus')} className="text-slate-600">
                            <IconPlus />
                        </button>
                        <button onClick={() => setActiveTab('radar')} className="text-blue-500">
                            <IconRadar />
                        </button>
                        <button onClick={() => setActiveTab('partners')} className="text-slate-600">
                            <IconPartner />
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
