<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kjanis AI System</title>

<style>
body {
  font-family: Arial;
  background: #f8fafc;
  color: #0f172a;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
  color: #1e3a8a;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #1e3a8a, #d4af37);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 5px;
}

.item {
  background: #f1f5f9;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border-left: 5px solid #d4af37;
}
</style>
</head>

<body>

<div class="card">
  <h2>🤖 Kjanis Business AI</h2>
</div>

<div class="card">
  <input id="firma" placeholder="Firma (z.B. Hausverwaltung Müller)">
  <input id="branche" placeholder="Art (z.B. Treppenhaus, Büro)">
  <button onclick="generate()">✨ Nachricht generieren</button>
</div>

<div class="card">
  <h3>📩 Nachricht (bearbeiten erlaubt)</h3>
  <textarea id="message" rows="8"></textarea>
  <button onclick="openMail()">📧 Email öffnen</button>
</div>

<div class="card">
  <h3>📋 Gespeicherte Kontakte</h3>
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("firmen")) || [];

function generate() {
  let firma = document.getElementById("firma").value;
  let branche = document.getElementById("branche").value;

  if (!firma) return;

  let text = `Hallo ${firma},

ich biete professionelle Reinigung in Hannover an (${branche}).

Aktuell habe ich freie Kapazitäten und kann kurzfristig starten.

Gerne erstelle ich Ihnen ein unverbindliches Angebot.

Viele Grüße`;

  document.getElementById("message").value = text;

  data.push({ firma, branche });
  localStorage.setItem("firmen", JSON.stringify(data));

  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    list.innerHTML += `
      <div class="item">
        <b>${d.firma}</b><br>
        ${d.branche}
      </div>
    `;
  });
}

function openMail() {
  let text = document.getElementById("message").value;
  window.location.href = "mailto:?subject=Reinigung Angebot&body=" + encodeURIComponent(text);
}

render();
</script>

</body>
</
