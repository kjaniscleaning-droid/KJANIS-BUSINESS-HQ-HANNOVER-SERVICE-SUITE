<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANIS HQ | V16.7 Universal</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Legacy (More stable for mobile/GitHub) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #020617; z-index: 1000; transition: opacity 0.5s; }
        .spinner { width: 45px; height: 45px; border: 4px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration & Fallbacks ---
        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : { apiKey: "local-mode" };
        const appId = window.__app_id || 'kjanis-hq-v16';
        
        let db = null;
        try {
            firebase.initializeApp(config);
            db = firebase.firestore();
        } catch(e) { console.warn("Running in local mode."); }

        // --- Icons ---
        const IconStats = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 12l3 3"/><path d="M12 3v3"/><path d="M12 18v3"/></svg>;
        const IconPartner = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dash');
            const [privacyMode, setPrivacyMode] = useState(false);
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            const [stats, setStats] = useState({ own: 0, prov: 0 });
            const [notification, setNotification] = useState(null);

            const notify = (m) => { setNotification(m); setTimeout(() => setNotification(null), 3000); };
            const formatMoney = (v) => privacyMode ? "•••• €" : (v || 0).toLocaleString('de-DE') + " €";

            // Boot-Logic: Hide Loader after 2.5s anyway to prevent hanging
            useEffect(() => {
                const timer = setTimeout(() => {
                    const l = document.getElementById('loader');
                    if(l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 500); }
                }, 2500);

                // Load Initial Data from LocalStorage
                const savedJobs = localStorage.getItem('kj_jobs');
                const savedPartners = localStorage.getItem('kj_partners');
                if(savedJobs) setJobs(JSON.parse(savedJobs));
                if(savedPartners) setPartners(JSON.parse(savedPartners));

                return () => clearTimeout(timer);
            }, []);

            // Stats Auto-Calc
            useEffect(() => {
                let o = 0, p = 0;
                jobs.forEach(j => {
                    if(j.type === 'own') o += Number(j.val);
                    else p += (Number(j.val) * 0.3);
                });
                setStats({ own: o, prov: p });
                localStorage.setItem('kj_jobs', JSON.stringify(jobs));
            }, [jobs]);

            useEffect(() => {
                localStorage.setItem('kj_partners', JSON.stringify(partners));
            }, [partners]);

            const handleSaveJob = (name, val, type) => {
                if(!name || !val) return notify("⚠️ Bitte alles ausfüllen!");
                const newJob = { id: Date.now(), name, val, type, date: new Date().toLocaleDateString() };
                setJobs([...jobs, newJob]);
                notify("✅ Auftrag gespeichert!");
                setActiveTab('dash');
                
                // Sync to cloud if possible
                if(db) {
                    try { db.collection('jobs').add(newJob).catch(() => {}); } catch(e) {}
                }
            };

            const addPartner = (name, mail) => {
                if(!name || !mail) return notify("⚠️ Daten fehlen!");
                setPartners([...partners, { id: Date.now(), name, mail }]);
                notify("🤝 Partner gelistet!");
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative p-6 pb-40">
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-2xl animate-bounce">
                            {notification}
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-10 pt-4">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter">KJANIS <span className="text-blue-500">HQ</span></h1>
                            <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Universal Edition V16.7</p>
                        </div>
                        <button onClick={() => setPrivacyMode(!privacyMode)} className="p-4 glass rounded-2xl border border-white/5 active:scale-90 transition-all">
                            {privacyMode ? '🔒' : '👁️'}
                        </button>
                    </header>

                    <main className="space-y-6">
                        {activeTab === 'dash' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="p-12 rounded-[3rem] glass shadow-2xl text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]" />
                                    <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-2">Gesamt-Profit</p>
                                    <h2 className="text-5xl font-black italic tracking-tighter leading-none">{formatMoney(stats.own + stats.prov)}</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-6 glass rounded-[2.5rem] text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">EIGEN</p>
                                        <p className="text-emerald-400 font-black text-lg leading-none">{formatMoney(stats.own)}</p>
                                    </div>
                                    <div className="p-6 glass rounded-[2.5rem] text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">PROVISION</p>
                                        <p className="text-blue-400 font-black text-lg leading-none">{formatMoney(stats.prov)}</p>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <p className="text-[9px] font-black text-slate-600 uppercase ml-4">Letzte Buchungen</p>
                                    {jobs.slice(-3).reverse().map(j => (
                                        <div key={j.id} className="p-5 glass rounded-[2rem] flex justify-between items-center">
                                            <div className="text-left">
                                                <p className="text-[10px] font-black uppercase leading-none">{j.name}</p>
                                                <p className="text-[7px] text-slate-500 mt-1">{j.date}</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="text-emerald-400 font-black text-xs">{j.val} €</span>
                                                <button onClick={() => setJobs(jobs.filter(x => x.id !== j.id))} className="text-slate-700 hover:text-red-500"><IconTrash/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'plus' && (
                            <div className="p-10 glass rounded-[3rem] space-y-4 text-center animate-in slide-in-from-bottom">
                                <h3 className="font-black text-blue-500 uppercase italic mb-2">Auftrag buchen</h3>
                                <input id="n" type="text" placeholder="Kunde / Ort" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center" />
                                <input id="v" type="number" placeholder="Summe in €" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center" />
                                <select id="t" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center text-slate-400 appearance-none">
                                    <option value="own">Eigene Arbeit (100%)</option>
                                    <option value="partner">Partner (Marge)</option>
                                </select>
                                <button onClick={() => handleSaveJob(document.getElementById('n').value, document.getElementById('v').value, document.getElementById('t').value)} className="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs tab-btn shadow-lg shadow-blue-900/40 italic">Speichern</button>
                            </div>
                        )}

                        {activeTab === 'radar' && (
                            <div className="space-y-6 text-center animate-in slide-in-from-right">
                                <div className="p-10 glass rounded-[3rem]">
                                    <h3 className="font-black text-blue-500 uppercase italic mb-4">Lead-Radar</h3>
                                    <button onClick={() => notify("📡 Suche Hannover Läuft...")} className="w-full bg-slate-800 py-5 rounded-3xl font-black uppercase text-[10px] tab-btn">Scan Hannover</button>
                                </div>
                                <p className="text-slate-600 text-[10px] uppercase font-bold tracking-widest italic animate-pulse">Scanning for opportunities...</p>
                            </div>
                        )}

                        {activeTab === 'partners' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="p-10 glass rounded-[3rem] space-y-4 text-center">
                                    <h3 className="font-black text-emerald-500 uppercase italic">Partner-Pool</h3>
                                    <input id="pn" type="text" placeholder="Name" className="w-full bg-slate-900 p-4 rounded-xl outline-none text-center" />
                                    <input id="pm" type="email" placeholder="E-Mail" className="w-full bg-slate-900 p-4 rounded-xl outline-none text-center" />
                                    <button onClick={() => addPartner(document.getElementById('pn').value, document.getElementById('pm').value)} className="w-full bg-emerald-600 py-5 rounded-3xl font-black uppercase text-[10px] tab-btn">Registrieren</button>
                                </div>
                                {partners.map(p => (
                                    <div key={p.id} className="p-5 glass rounded-[2rem] flex justify-between items-center">
                                        <div className="text-left">
                                            <p className="text-[10px] font-black uppercase leading-none">{p.name}</p>
                                            <p className="text-[8px] text-slate-500 mt-1 uppercase font-bold">{p.mail}</p>
                                        </div>
                                        <button onClick={() => setPartners(partners.filter(x => x.id !== p.id))} className="text-slate-700 hover:text-red-500 p-2"><IconTrash/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-8 right-8 glass rounded-[3rem] p-8 flex justify-around shadow-2xl z-50">
                        <button onClick={() => setActiveTab('dash')} className={`tab-btn ${activeTab === 'dash' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconStats /></button>
                        <button onClick={() => setActiveTab('plus')} className={`tab-btn ${activeTab === 'plus' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPlus /></button>
                        <button onClick={() => setActiveTab('radar')} className={`tab-btn ${activeTab === 'radar' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconRadar /></button>
                        <button onClick={() => setActiveTab('partners')} className={`tab-btn ${activeTab === 'partners' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPartner /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
