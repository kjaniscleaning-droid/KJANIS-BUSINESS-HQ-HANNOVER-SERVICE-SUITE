<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kjanis HQ</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #list {
      margin-top: 20px;
    }

    .item {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Kjanis HQ</h1>

  <input id="label" placeholder="Kunde / Objekt">
  <input id="amount" placeholder="Betrag €">

  <button onclick="addEntry()">Speichern</button>

  <div id="list"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      serverTimestamp, 
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 DEINE FIREBASE DATEN HIER EINTRAGEN
    const firebaseConfig = {
      apiKey: "DEIN_API_KEY",
      authDomain: "kjanis-6a706.firebaseapp.com",
      projectId: "kjanis-6a706"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const list = document.getElementById("list");

    const q = query(collection(db, "journal"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const d = doc.data();

        list.innerHTML += `
          <div class="item">
            <b>${d.label}</b><br>
            ${d.amount} €
          </div>
        `;
      });
    });

    window.addEntry = async () => {
      const label = document.getElementById("label").value;
      const amount = document.getElementById("amount").value;

      if (!label || !amount) {
        alert("Bitte alles ausfüllen");
        return;
      }

      await addDoc(collection(db, "journal"), {
        label: label,
        amount: parseFloat(amount),
        timestamp: serverTimestamp()
      });

      document.getElementById("label").value = "";
      document.getElementById("amount").value = "";
    };
  </script>

</body>
</html>
