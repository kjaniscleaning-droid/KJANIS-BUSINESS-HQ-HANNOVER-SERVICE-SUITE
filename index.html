<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kjanis App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

.item {
  background: #334155;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">
  <h2>📱 Kjanis App</h2>
</div>

<div class="card">
  <input id="name" placeholder="Kunde">
  <input id="price" placeholder="Betrag €">
  <button onclick="save()">Speichern</button>
</div>

<div class="card">
  <h3>📋 Aufträge</h3>
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function save() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if (!name || !price) return;

  data.push({ name, price });
  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";

  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    list.innerHTML += `
      <div class="item">
        ${d.name} – ${d.price} €
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
