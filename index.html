<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANIS HQ | Supreme V16.6</title>
    
    <!-- Stabile Basis-Skripte (Keine Module für maximale Kompatibilität) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase (Klassische Version - Lädt garantiert) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #020617; z-index: 1000; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Init ---
        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : { apiKey: "supreme-ready" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = window.__app_id || 'kjanis-hq-v16';

        // --- Icons ---
        const IconStats = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 12l3 3"/><path d="M12 3v3"/><path d="M12 18v3"/></svg>;
        const IconPartner = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dash');
            const [privacyMode, setPrivacyMode] = useState(false);
            const [stats, setStats] = useState({ own: 0, prov: 0 });
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            const [leads, setLeads] = useState([]);
            const [notification, setNotification] = useState(null);

            const notify = (m) => { setNotification(m); setTimeout(() => setNotification(null), 3000); };
            const formatMoney = (v) => privacyMode ? "••••,•• €" : (v || 0).toLocaleString('de-DE', { minimumFractionDigits: 2 }) + " €";

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    const loader = document.getElementById('loader');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubP = db.collection(`${path}/partners`).onSnapshot(s => {
                    setPartners(s.docs.map(d => ({id: d.id, ...d.data()})));
                });

                const unsubJ = db.collection(`${path}/jobs`).orderBy('date', 'desc').onSnapshot(s => {
                    const list = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setJobs(list);
                    let o = 0, p = 0;
                    list.forEach(j => {
                        if(j.type === 'own') o += Number(j.val);
                        else p += (Number(j.val) * 0.3);
                    });
                    setStats({ own: o, prov: p });
                });
                return () => { unsubP(); unsubJ(); };
            }, [user]);

            const saveJob = async (n, v, t) => {
                if(!n || !v) return notify("⚠️ Daten fehlen!");
                await db.collection(`artifacts/${appId}/users/${user.uid}/jobs`).add({
                    name: n, val: Number(v), type: t, date: new Date().toISOString()
                });
                setActiveTab('dash');
                notify("✅ Cloud-Save erfolgreich");
            };

            const addPartner = async (n, e) => {
                if(!n || !e) return notify("⚠️ Daten fehlen!");
                await db.collection(`artifacts/${appId}/users/${user.uid}/partners`).add({name: n, email: e});
                notify("🤝 Partner registriert");
            };

            const scan = () => {
                notify("📡 KI scannt Hannover...");
                setTimeout(() => {
                    setLeads([{id: 1, name: "Flur List", val: 450}, {id: 2, name: "Garten Linden", val: 890}]);
                }, 1000);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-40 px-6">
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-2xl animate-bounce">
                            {notification}
                        </div>
                    )}

                    <header className="py-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase leading-none tracking-tighter">KJANIS <span className="text-blue-500">HQ</span></h1>
                            <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mt-1">Supreme Edition V16.6</p>
                        </div>
                        <button onClick={() => setPrivacyMode(!privacyMode)} className="p-4 glass rounded-2xl border border-white/5 active:scale-90 transition-all">
                            {privacyMode ? '🔒' : '👁️'}
                        </button>
                    </header>

                    <main className="space-y-8">
                        {activeTab === 'dash' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="p-12 rounded-[3rem] glass shadow-2xl text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]" />
                                    <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-2">Netto-Profit (Cloud-Live)</p>
                                    <h2 className="text-5xl font-black italic tracking-tighter leading-none">{formatMoney(stats.own + stats.prov)}</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-6 glass rounded-[2.5rem] text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">EIGEN</p>
                                        <p className="text-emerald-400 font-black text-lg">{formatMoney(stats.own)}</p>
                                    </div>
                                    <div className="p-6 glass rounded-[2.5rem] text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">PROVISION</p>
                                        <p className="text-blue-400 font-black text-lg">{formatMoney(stats.prov)}</p>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <p className="text-[9px] font-black text-slate-600 uppercase ml-4 tracking-widest leading-none">Aktivitäten</p>
                                    {jobs.slice(0,3).map(j => (
                                        <div key={j.id} className="p-5 glass rounded-[2rem] flex justify-between items-center">
                                            <span className="text-[10px] font-black uppercase">{j.name}</span>
                                            <span className="text-emerald-400 font-black text-xs">{j.val} €</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'plus' && (
                            <div className="p-10 glass rounded-[3rem] space-y-4 text-center">
                                <h3 className="font-black text-blue-500 uppercase italic mb-2">Auftrag buchen</h3>
                                <input id="n" type="text" placeholder="Kunde" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center" />
                                <input id="v" type="number" placeholder="Summe €" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center" />
                                <select id="t" className="w-full bg-slate-900 p-5 rounded-2xl outline-none text-center text-slate-400 appearance-none">
                                    <option value="own">Eigene Arbeit</option>
                                    <option value="partner">Partner</option>
                                </select>
                                <button onClick={() => saveJob(document.getElementById('n').value, document.getElementById('v').value, document.getElementById('t').value)} className="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs btn-active shadow-lg shadow-blue-900/40">In Cloud Sichern</button>
                            </div>
                        )}

                        {activeTab === 'radar' && (
                            <div className="space-y-6 text-center">
                                <div className="p-10 glass rounded-[3rem]">
                                    <h3 className="font-black text-blue-500 uppercase italic mb-4">KI Radar</h3>
                                    <button onClick={scan} className="w-full bg-slate-800 py-5 rounded-3xl font-black uppercase text-[10px] btn-active">Scan Hannover</button>
                                </div>
                                {leads.map(l => (
                                    <div key={l.id} className="p-6 glass rounded-[2rem] flex justify-between items-center text-left border-l-4 border-blue-500">
                                        <span className="text-xs font-black uppercase">{l.name}</span>
                                        <button onClick={() => {saveJob(l.name, l.val, 'partner'); setActiveTab('dash');}} className="bg-blue-600 px-5 py-2 rounded-xl text-[9px] font-black">Deal</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'partners' && (
                            <div className="space-y-6">
                                <div className="p-10 glass rounded-[3rem] space-y-4 text-center">
                                    <h3 className="font-black text-emerald-500 uppercase italic">Partner-Pool</h3>
                                    <input id="pn" type="text" placeholder="Firma" className="w-full bg-slate-900 p-4 rounded-xl outline-none text-center" />
                                    <input id="pe" type="email" placeholder="E-Mail" className="w-full bg-slate-900 p-4 rounded-xl outline-none text-center" />
                                    <button onClick={() => addPartner(document.getElementById('pn').value, document.getElementById('pe').value)} className="w-full bg-emerald-600 py-5 rounded-3xl font-black uppercase text-[10px] btn-active">Listen</button>
                                </div>
                                {partners.map(p => (
                                    <div key={p.id} className="p-5 glass rounded-[2rem] flex justify-between items-center shadow-lg">
                                        <span className="text-[10px] font-black uppercase tracking-tight">{p.name}</span>
                                        <button onClick={() => db.collection(`artifacts/${appId}/users/${user.uid}/partners`).doc(p.id).delete()} className="text-slate-700 hover:text-red-500 p-2"><IconTrash/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-8 right-8 glass rounded-[3rem] p-8 flex justify-around shadow-2xl z-50">
                        <button onClick={() => setActiveTab('dash')} className={`transition-all ${activeTab === 'dash' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconStats /></button>
                        <button onClick={() => setActiveTab('plus')} className={`transition-all ${activeTab === 'plus' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPlus /></button>
                        <button onClick={() => setActiveTab('radar')} className={`transition-all ${activeTab === 'radar' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconRadar /></button>
                        <button onClick={() => setActiveTab('partners')} className={`transition-all ${activeTab === 'partners' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPartner /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
