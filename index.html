<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANIS HQ | Master Platinum</title>
    
    <!-- React & Babel für direkte Ausführung im Browser (Wichtig für GitHub Pages) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const IconStats = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
        const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconPartner = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12l3 3"/><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dash');
            const [privacyMode, setPrivacyMode] = useState(false);
            const [notification, setNotification] = useState(null);
            const [stats, setStats] = useState({ own: 0, prov: 0 });
            const [radarResults, setRadarResults] = useState([]);
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            
            const printRef = useRef();

            const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
            const formatMoney = (amount) => privacyMode ? "••••,•• €" : (amount || 0).toLocaleString('de-DE', { minimumFractionDigits: 2 }) + " €";

            // Daten lokal sichern (Backup, falls Cloud hakt)
            useEffect(() => {
                const savedJobs = localStorage.getItem('kjanis_jobs');
                const savedPartners = localStorage.getItem('kjanis_partners');
                if (savedJobs) setJobs(JSON.parse(savedJobs));
                if (savedPartners) setPartners(JSON.parse(savedPartners));
            }, []);

            useEffect(() => {
                localStorage.setItem('kjanis_jobs', JSON.stringify(jobs));
                localStorage.setItem('kjanis_partners', JSON.stringify(partners));
                
                let o = 0, p = 0;
                jobs.forEach(j => {
                    if (j.type === 'own') o += Number(j.val);
                    else p += (Number(j.val) * 0.3);
                });
                setStats({ own: o, prov: p });
            }, [jobs, partners]);

            const addJob = (name, val, type, partnerId = '') => {
                const newJob = { id: Date.now(), name, val, type, partnerId, date: new Date().toLocaleDateString() };
                setJobs([...jobs, newJob]);
                notify("✅ Auftrag gespeichert");
                setActiveTab('dash');
            };

            const addPartner = (name, email) => {
                setPartners([...partners, { id: Date.now(), name, email }]);
                notify("🤝 Partner gelistet");
            };

            const deleteJob = (id) => setJobs(jobs.filter(j => j.id !== id));

            return (
                <div className="min-h-screen text-white pb-32">
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-blue-600 px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-2xl animate-bounce">
                            {notification}
                        </div>
                    )}

                    <header className="p-8 max-w-md mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black italic uppercase leading-none tracking-tighter">KJANIS <span className="text-blue-500">HQ</span></h1>
                            <p className="text-[7px] font-black text-slate-500 uppercase tracking-widest mt-1">Platinum Suite V16.3</p>
                        </div>
                        <button onClick={() => setPrivacyMode(!privacyMode)} className="p-4 bg-slate-900 rounded-2xl border border-white/5">
                            {privacyMode ? '🔒' : '👁️'}
                        </button>
                    </header>

                    <main className="max-w-md mx-auto px-6 space-y-6">
                        {activeTab === 'dash' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="p-10 rounded-[2.5rem] bg-slate-900 border border-white/5 shadow-2xl text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500" />
                                    <p className="text-[9px] text-slate-500 font-black uppercase mb-2">Gesamt-Profit</p>
                                    <h2 className="text-5xl font-black italic tracking-tighter">{formatMoney(stats.own + stats.prov)}</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-6 bg-slate-900/50 rounded-3xl border border-white/5 text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">EIGEN</p>
                                        <p className="text-emerald-400 font-black">{formatMoney(stats.own)}</p>
                                    </div>
                                    <div className="p-6 bg-slate-900/50 rounded-3xl border border-white/5 text-center">
                                        <p className="text-[8px] text-slate-500 font-black mb-1">PROVISION</p>
                                        <p className="text-blue-400 font-black">{formatMoney(stats.prov)}</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-3">
                                    <p className="text-[9px] font-black text-slate-600 uppercase ml-2">Letzte Buchungen</p>
                                    {jobs.slice(-3).reverse().map(j => (
                                        <div key={j.id} className="p-4 bg-slate-900/30 rounded-2xl border border-white/5 flex justify-between items-center">
                                            <span className="text-[10px] font-bold">{j.name}</span>
                                            <span className="text-emerald-400 font-black text-[10px]">{j.val} €</span>
                                            <button onClick={() => deleteJob(j.id)} className="text-slate-600"><IconTrash/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'plus' && (
                            <div className="p-8 bg-slate-900 rounded-[2.5rem] border border-white/5 space-y-4 animate-fade-in">
                                <h3 className="text-center font-black text-blue-500 uppercase italic">Buchung</h3>
                                <input id="job-n" type="text" placeholder="Kunde" className="w-full bg-black p-4 rounded-xl border border-white/5 outline-none" />
                                <input id="job-v" type="number" placeholder="Summe €" className="w-full bg-black p-4 rounded-xl border border-white/5 outline-none" />
                                <select id="job-t" className="w-full bg-black p-4 rounded-xl border border-white/5 text-slate-400">
                                    <option value="own">Eigene Arbeit</option>
                                    <option value="partner">Partner</option>
                                </select>
                                <button onClick={() => {
                                    const n = document.getElementById('job-n').value;
                                    const v = document.getElementById('job-v').value;
                                    const t = document.getElementById('job-t').value;
                                    if(n && v) addJob(n, v, t);
                                }} className="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs">Speichern</button>
                            </div>
                        )}

                        {activeTab === 'radar' && (
                            <div className="space-y-4 animate-fade-in text-center">
                                <div className="p-8 bg-slate-900 rounded-[2.5rem] border border-white/5">
                                    <h3 className="font-black text-blue-500 uppercase mb-4">KI Markt-Scanner</h3>
                                    <button onClick={() => {
                                        setRadarResults([
                                            {id: 1, name: "Hausflur List", loc: "Hannover", val: 450},
                                            {id: 2, name: "Garten Linden", loc: "Hannover", val: 890}
                                        ]);
                                        notify("📡 Suche abgeschlossen");
                                    }} className="w-full bg-slate-800 py-4 rounded-xl font-black uppercase text-[10px]">Scan Hannover</button>
                                </div>
                                {radarResults.map(l => (
                                    <div key={l.id} className="p-5 bg-slate-900/50 rounded-2xl border border-blue-500/20 flex justify-between items-center text-left">
                                        <div>
                                            <p className="text-xs font-black uppercase">{l.name}</p>
                                            <p className="text-emerald-400 font-bold text-[10px]">{l.val} €</p>
                                        </div>
                                        <button onClick={() => addJob(l.name, l.val, 'partner')} className="bg-blue-600 px-4 py-2 rounded-lg text-[9px] font-black uppercase">Sichern</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'partners' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="p-8 bg-slate-900 rounded-[2.5rem] border border-white/5 space-y-3">
                                    <h3 className="text-center font-black text-emerald-500 uppercase italic">Partner-Pool</h3>
                                    <input id="p-n" type="text" placeholder="Firma" className="w-full bg-black p-4 rounded-xl border border-white/5 outline-none" />
                                    <input id="p-e" type="email" placeholder="E-Mail" className="w-full bg-black p-4 rounded-xl border border-white/5 outline-none" />
                                    <button onClick={() => {
                                        const n = document.getElementById('p-n').value;
                                        const e = document.getElementById('p-e').value;
                                        if(n && e) addPartner(n, e);
                                    }} className="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-[10px]">Listen</button>
                                </div>
                                {partners.map(p => (
                                    <div key={p.id} className="p-4 bg-slate-900/40 rounded-2xl border border-white/5 flex justify-between">
                                        <span className="text-[10px] font-bold">{p.name}</span>
                                        <span className="text-[8px] text-slate-500 italic">{p.email}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-6 right-6 bg-slate-900/90 backdrop-blur-xl border border-white/5 rounded-[2.5rem] p-6 flex justify-around shadow-2xl">
                        <button onClick={() => setActiveTab('dash')} className={`transition-all ${activeTab === 'dash' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconStats /></button>
                        <button onClick={() => setActiveTab('plus')} className={`transition-all ${activeTab === 'plus' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPlus /></button>
                        <button onClick={() => setActiveTab('radar')} className={`transition-all ${activeTab === 'radar' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconRadar /></button>
                        <button onClick={() => setActiveTab('partners')} className={`transition-all ${activeTab === 'partners' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPartner /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
