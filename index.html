<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KJANIS Cleaning HQ | Enterprise V18.1</title>

    <!-- Core Engines: Diese müssen UNBEDINGT am Anfang stehen -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase System: Für Cloud-Speicherung -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        
        /* Lade-Bildschirm */
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #020617;
            z-index: 9999; transition: opacity 0.5s;
        }
        .spinner {
            width: 55px; height: 55px; border: 5px solid #1e293b;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn:active { transform: scale(0.85); }
        ::-webkit-scrollbar { width: 0px; }
        
        /* Animationen für die Tabs */
        .page-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <!-- Der Loader zeigt dem Nutzer, dass die App arbeitet -->
    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500">KJANIS HQ BOOTING...</p>
    </div>
    
    <!-- Hier wird die App von React reingeschrieben -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firmendaten ---
        const COMPANY = { name: "KJANIS Cleaning", city: "Hannover" };
        const PIN_CODE = "1234";

        // --- Firebase Cloud Konfiguration ---
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : { apiKey: "supreme-key" };
        const appId = window.__app_id || 'kjanis-hq-v16';
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- SVGs für die Navigation ---
        const IconStats = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
        const IconRadar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 12l3 3"/><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/></svg>;
        const IconPartner = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

        const App = () => {
            const [tab, setTab] = useState("dash");
            const [user, setUser] = useState(null);
            const [notification, setNotification] = useState(null);
            const [unlocked, setUnlocked] = useState(false);
            
            // App-Daten
            const [jobs, setJobs] = useState([]);
            const [partners, setPartners] = useState([]);
            const [leads, setLeads] = useState([]);
            const [isScanning, setIsScanning] = useState(false);

            const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
            const formatMoney = (v) => unlocked ? (v || 0).toLocaleString('de-DE', { minimumFractionDigits: 2 }) + " €" : "••••,•• €";

            // 1. System-Start (Authentication & Realtime Sync)
            useEffect(() => {
                // Loader-Notaus nach 2.5 Sekunden
                const loaderTimer = setTimeout(() => {
                    const loader = document.getElementById('loader');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }
                }, 2500);

                // Cloud-Login
                auth.signInAnonymously().catch(err => console.error("Cloud-Error:", err));
                auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) {
                        const path = `artifacts/${appId}/users/${u.uid}`;
                        // Echtzeit-Abgleich der Aufträge
                        db.collection(`${path}/jobs`).orderBy('date', 'desc').onSnapshot(s => {
                            setJobs(s.docs.map(d => ({id: d.id, ...d.data()})));
                        });
                        // Echtzeit-Abgleich der Partner
                        db.collection(`${path}/partners`).onSnapshot(s => {
                            setPartners(s.docs.map(d => ({id: d.id, ...d.data()})));
                        });
                    }
                });
                return () => clearTimeout(loaderTimer);
            }, []);

            // 2. Firmensuche (Der Lead-Radar für Hannover)
            const runRadar = async () => {
                setIsScanning(true);
                setLeads([]);
                notify("📡 KI scannt Hannover-Mitte...");

                try {
                    // Echte Abfrage an Map-Datenbank für Hannover
                    const query = `
                        [out:json][timeout:25];
                        area["name"="${COMPANY.city}"]->.searchArea;
                        (
                          node["office"](area.searchArea);
                          node["shop"](area.searchArea);
                          node["amenity"="restaurant"](area.searchArea);
                        );
                        out body 15;
                    `;
                    const res = await fetch("https://overpass-api.de/api/interpreter", {
                        method: "POST",
                        body: query
                    });
                    const data = await res.json();
                    
                    const results = data.elements.map((el, i) => ({
                        id: i,
                        name: el.tags?.name || "Gewerbe-Objekt",
                        address: `${el.tags?.["addr:street"] || "Hannover"} ${el.tags?.["addr:housenumber"] || ""}`,
                        sqm: 120 + Math.floor(Math.random() * 350),
                        val: 400 + Math.floor(Math.random() * 1100)
                    }));
                    
                    setLeads(results);
                    notify(`✅ ${results.length} Firmen gefunden!`);
                } catch (e) {
                    notify("⚠️ Offline-Modus: Demo-Daten aktiv");
                    setLeads([{id: 1, name: "Bürohaus Vahrenwald", address: "Hannover", val: 750, sqm: 180}]);
                } finally {
                    setIsScanning(false);
                }
            };

            // 3. Datenbank-Aktionen (Speichern)
            const saveJob = (l) => {
                if (!user) return;
                db.collection(`artifacts/${appId}/users/${user.uid}/jobs`).add({
                    name: l.name, 
                    value: Number(l.val), 
                    date: new Date().toISOString()
                });
                notify("✅ In Cloud gespeichert!");
                setTab("dash");
            };

            const savePartner = (l) => {
                if (!user) return;
                db.collection(`artifacts/${appId}/users/${user.uid}/partners`).add({
                    name: l.name, 
                    address: l.address
                });
                notify("🤝 Partner registriert!");
            };

            const total = jobs.reduce((sum, j) => sum + Number(j.value), 0);

            return (
                <div className="max-w-xl mx-auto p-6 space-y-8 pb-44">
                    {/* Benachrichtigungs-System */}
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] bg-blue-600 px-8 py-4 rounded-2xl font-black text-[11px] uppercase shadow-2xl animate-bounce text-center tracking-widest border border-white/20">
                            {notification}
                        </div>
                    )}

                    {/* App Header */}
                    <header className="text-center pt-8">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter leading-none">KJANIS <span className="text-blue-500">HQ</span></h1>
                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-3">Master Platinum V18.1</p>
                    </header>

                    {/* Haupt-Anzeige (Tabs) */}
                    <main className="min-h-[60vh]">
                        {tab === "dash" && (
                            <div className="space-y-6 page-fade">
                                {/* Profit-Zentrale */}
                                <div className="glass p-12 rounded-[3.5rem] text-center relative overflow-hidden shadow-2xl">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 shadow-[0_0_15px_#3b82f6]"></div>
                                    <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-2 text-center">Netto-Profit (Live)</p>
                                    {unlocked ? (
                                        <p className="text-6xl font-black italic tracking-tighter text-center">{formatMoney(total)}</p>
                                    ) : (
                                        <button onClick={() => {if(prompt("System-PIN eingeben:")===PIN_CODE)setUnlocked(true)}} className="bg-blue-600 px-10 py-5 rounded-2xl font-black uppercase text-xs tab-btn shadow-xl shadow-blue-900/40 border border-white/10 mx-auto block">🔒 Entsperren</button>
                                    )}
                                </div>

                                {/* Auftrags-Historie */}
                                <div className="space-y-4 px-2">
                                    <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-3 text-left">Buchungs-Journal</p>
                                    {jobs.slice(0, 5).map(j => (
                                        <div key={j.id} className="glass p-6 rounded-[2.5rem] flex justify-between items-center border border-white/5 animate-in slide-in-from-bottom">
                                            <div className="text-left">
                                                <p className="text-[11px] font-black uppercase text-left">{j.name}</p>
                                                <p className="text-[8px] text-slate-500 uppercase mt-1 font-bold text-left">{new Date(j.date).toLocaleDateString('de-DE')}</p>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <span className="text-emerald-400 font-black text-sm">{Number(j.value).toLocaleString('de-DE')} €</span>
                                                <button onClick={() => db.collection(`artifacts/${appId}/users/${user.uid}/jobs`).doc(j.id).delete()} className="text-slate-800 hover:text-red-500 transition-colors"><IconTrash/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {jobs.length === 0 && <p className="text-center text-slate-700 italic py-12 text-xs uppercase font-black tracking-widest opacity-50">Warte auf Daten-Sync...</p>}
                                </div>
                            </div>
                        )}

                        {tab === "radar" && (
                            <div className="space-y-6 page-fade">
                                {/* Such-Zentrale */}
                                <div className="glass p-10 rounded-[3rem] text-center space-y-4 border border-blue-500/10">
                                    <h3 className="font-black text-blue-500 uppercase italic text-sm tracking-widest text-center">Lead-Generator (Hannover)</h3>
                                    <button onClick={runRadar} disabled={isScanning} className="w-full bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-900/40 tab-btn italic border border-white/10">
                                        {isScanning ? "Scanner arbeitet..." : "Markt-Scan Starten"}
                                    </button>
                                </div>

                                {/* Suchergebnisse */}
                                <div className="space-y-4">
                                    {leads.map(l => (
                                        <div key={l.id} className="glass p-7 rounded-[2.5rem] border-l-4 border-blue-500 animate-in slide-in-from-bottom">
                                            <div className="flex justify-between items-start mb-5">
                                                <div className="text-left">
                                                    <h4 className="font-black uppercase text-[13px] leading-tight text-left">{l.name}</h4>
                                                    <p className="text-[10px] text-slate-500 mt-2 uppercase font-bold text-left">{l.address}</p>
                                                </div>
                                                <span className="text-emerald-400 font-black text-sm">{l.val} €</span>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => saveJob(l)} className="flex-1 bg-emerald-600 py-4 rounded-xl font-black text-[10px] uppercase tab-btn border border-white/5">Auftrag</button>
                                                <button onClick={() => savePartner(l)} className="flex-1 bg-slate-800 py-4 rounded-xl font-black text-[10px] uppercase tab-btn border border-white/5">Listen</button>
                                            </div>
                                        </div>
                                    ))}
                                    {isScanning && <div className="text-center py-24 animate-pulse text-slate-600 font-black uppercase text-[11px] tracking-widest italic">Analyse läuft...</div>}
                                </div>
                            </div>
                        )}

                        {tab === "partners" && (
                            <div className="space-y-6 page-fade">
                                <div className="glass p-10 rounded-[3rem] text-center border border-emerald-500/10">
                                    <h3 className="font-black text-emerald-500 uppercase italic text-sm tracking-widest text-center">Partner-Netzwerk</h3>
                                    <p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-2 text-center">Cloud-Gespeicherte Kontakte</p>
                                </div>
                                <div className="space-y-3 px-1">
                                    {partners.map(p => (
                                        <div key={p.id} className="glass p-6 rounded-[2rem] flex justify-between items-center shadow-lg animate-in slide-in-from-left">
                                            <div className="text-left">
                                                <p className="text-[12px] font-black uppercase text-left">{p.name}</p>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase text-left mt-1">{p.address}</p>
                                            </div>
                                            <button onClick={() => db.collection(`artifacts/${appId}/users/${user.uid}/partners`).doc(p.id).delete()} className="text-slate-800 hover:text-red-500 transition-colors p-3"><IconTrash/></button>
                                        </div>
                                    ))}
                                    {partners.length === 0 && <p className="text-center text-slate-700 italic py-16 text-xs uppercase font-black tracking-widest opacity-40">Keine Partner gelistet</p>}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Tablet-Navigation (Unten) */}
                    <nav className="fixed bottom-10 left-8 right-8 glass p-9 rounded-[3.5rem] flex justify-around shadow-[0_25px_65px_rgba(0,0,0,0.7)] z-[9999] border border-white/5">
                        <button onClick={() => setTab("dash")} className={`tab-btn ${tab === 'dash' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconStats /></button>
                        <button onClick={() => setTab("radar")} className={`tab-btn ${tab === 'radar' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconRadar /></button>
                        <button onClick={() => setTab("partners")} className={`tab-btn ${tab === 'partners' ? 'text-blue-500 scale-125' : 'text-slate-600'}`}><IconPartner /></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
