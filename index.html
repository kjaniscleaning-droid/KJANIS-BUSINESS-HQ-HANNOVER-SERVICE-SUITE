<!DOCTYPE html>
<html>
<head>
  <title>Kjanis HQ</title>
</head>
<body>

<h1>Kjanis HQ</h1>

<input id="label" placeholder="Kunde"><br><br>
<input id="amount" placeholder="Betrag"><br><br>

<button onclick="addEntry()">Speichern</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "DEIN_API_KEY",
  projectId: "kjanis-6a706"
});

const db = getFirestore(app);

const list = document.getElementById("list");

onSnapshot(collection(db,"journal"), snap => {
  list.innerHTML = "";
  snap.forEach(doc=>{
    let d = doc.data();
    list.innerHTML += `<div>${d.label} - ${d.amount}€</div>`;
  });
});

window.addEntry = async () => {
  let label = document.getElementById("label").value;
  let amount = document.getElementById("amount").value;

  await addDoc(collection(db,"journal"),{
    label,
    amount: parseFloat(amount),
    timestamp: serverTimestamp()
  });
};
</script>

</body>
</html>
