<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kjani App</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-black text-white">
<div id="root"></div>

<script type="text/babel">

const firebaseConfig = {
  apiKey: "AIzaSyAPaLWV3QaIZOBdN0dzgB_9BIwEtNZM9BU",
  authDomain: "kjani-6a706.firebaseapp.com",
  projectId: "kjani-6a706",
  storageBucket: "kjani-6a706.firebasestorage.app",
  messagingSenderId: "62503034041",
  appId: "1:62503034041:web:e8ec81d1a96f38b8148f68"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function App() {
  const [jobs, setJobs] = React.useState([]);
  const [user, setUser] = React.useState(null);

  React.useEffect(() => {
    auth.signInAnonymously();

    auth.onAuthStateChanged(u => {
      setUser(u);

      if (u) {
        db.collection("jobs")
          .orderBy("created", "desc")
          .onSnapshot(snapshot => {
            const data = snapshot.docs.map(doc => ({
              id: doc.id,
              ...doc.data()
            }));
            setJobs(data);
          });
      }
    });
  }, []);

  const addJob = async () => {
    const name = prompt("Kunde?");
    const phone = prompt("Telefon?");
    const job = prompt("Was machen?");

    if (!name || !phone) return;

    await db.collection("jobs").add({
      name,
      phone,
      job,
      created: new Date()
    });
  };

  return (
    <div className="p-4 max-w-md mx-auto">
      <h1 className="text-2xl font-bold mb-4">📱 Kjani Aufträge</h1>

      <button 
        onClick={addJob}
        className="bg-blue-600 p-4 rounded-xl w-full mb-4"
      >
        ➕ Auftrag hinzufügen
      </button>

      {jobs.map(job => (
        <div key={job.id} className="bg-gray-800 p-4 mb-3 rounded-xl">
          <p className="font-bold">{job.name}</p>
          <p>{job.job}</p>
          <p>{job.phone}</p>

          <a 
            href={`tel:${job.phone}`} 
            className="block bg-green-600 mt-3 p-3 text-center rounded-xl"
          >
            📞 Anrufen
          </a>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
