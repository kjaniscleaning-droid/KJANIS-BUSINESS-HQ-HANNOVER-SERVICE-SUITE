<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kjanis Business HQ | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --dark: #020617;
            --blue: #2563eb;
            --emerald: #10b981;
            --card-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            background-color: var(--dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        /*  */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
        }

        .nav-bar {
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.8rem;
            display: flex;
            justify-content: space-around;
            padding: 14px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item.active { 
            color: #60a5fa; 
            transform: translateY(-4px); 
        }

        input, select {
            background: rgba(30, 41, 59, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 1.25rem !important;
            padding: 1.25rem !important;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        .job-card {
            background: rgba(30, 41, 59, 0.4);
            border-left: 6px solid var(--blue);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--emerald);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--emerald);
        }

        .radar-scan {
            width: 180px;
            height: 180px;
            border: 2px solid rgba(37, 99, 235, 0.2);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
        }

        .radar-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: var(--blue);
            transform-origin: left;
            animation: rotate 3s linear infinite;
            box-shadow: 0 0 15px var(--blue);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-44">

    <!-- Ladeschirm -->
    <div id="loader">
        <div class="w-16 h-16 border-4 border-slate-900 border-t-blue-500 rounded-full animate-spin mb-8"></div>
        <p class="text-[11px] font-black uppercase tracking-[0.6em] text-slate-500 italic">KI-Zentrale Hannover aktiv...</p>
        <button onclick="document.getElementById('loader').style.display='none'" class="mt-12 text-[8px] text-slate-700 uppercase font-black border border-slate-800 px-6 py-2 rounded-full active:bg-slate-800">Überspringen</button>
    </div>

    <div class="p-6 max-w-md mx-auto">
        
        <header class="flex justify-between items-center mb-10 pt-4">
            <div class="text-left">
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-left">KJANIS <span class="text-blue-500">HQ</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <div class="status-dot animate-pulse"></div>
                    <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest text-left">Master Suite Live</p>
                </div>
            </div>
            <button onclick="togglePrivacy()" class="w-12 h-12 glass-panel flex items-center justify-center text-xl shadow-2xl active:scale-90 transition-transform">🔒</button>
        </header>

        <!-- DASHBOARD -->
        <section id="p-dash" class="space-y-6">
            <div class="glass-panel p-12 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-600 to-emerald-500"></div>
                <p class="text-[10px] text-slate-400 uppercase font-black tracking-[0.3em] mb-3 text-center">Cloud-Gesamtumsatz</p>
                <h2 id="ui-total" class="text-6xl font-black italic tracking-tighter text-center">0,00 €</h2>
                <div class="mt-4 flex justify-center gap-2">
                    <span class="bg-blue-500/10 text-blue-500 text-[8px] font-black px-2 py-1 rounded uppercase tracking-widest">Sicher Verschlüsselt</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-6 text-center">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Eigene Arbeit</p>
                    <p id="ui-own" class="text-xl font-black text-emerald-400">0 €</p>
                </div>
                <div class="glass-panel p-6 text-center">
                    <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Provision (30%)</p>
                    <p id="ui-prov" class="text-xl font-black text-blue-400">0 €</p>
                </div>
            </div>

            <div class="space-y-3">
                <p class="text-[9px] text-slate-700 font-black uppercase ml-2 tracking-widest text-left">Letzte Aktivitäten</p>
                <div id="log-container" class="space-y-2"></div>
            </div>
        </section>

        <!-- KI RADAR -->
        <section id="p-radar" class="hidden space-y-6">
            <div class="glass-panel p-10 flex flex-col items-center">
                <h3 class="font-black mb-6 uppercase text-blue-500 italic text-center">Hannover Job-Radar</h3>
                <div class="radar-scan mb-8">
                    <div class="radar-line"></div>
                </div>
                <button onclick="scanForJobs()" id="scan-btn" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Markt-Scan starten</button>
            </div>
            
            <div id="radar-results" class="space-y-3">
                <p class="text-center py-10 opacity-20 text-[10px] font-black uppercase text-center">Warte auf Scan-Befehl</p>
            </div>
        </section>

        <!-- JOBS BUCHEN -->
        <section id="p-jobs" class="hidden space-y-4">
            <div class="glass-panel p-8 text-center">
                <h3 class="font-black mb-6 uppercase text-blue-500 italic tracking-widest text-center">Auftrag Buchen</h3>
                <div class="space-y-4 text-left">
                    <input type="text" id="in-name" placeholder="Kunde / Projektname">
                    <input type="text" id="in-loc" placeholder="Standort (z.B. List, Linden)">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="in-val" placeholder="Summe (€)">
                        <select id="in-type">
                            <option value="own">Eigenarbeit</option>
                            <option value="prov">Partner (30%)</option>
                        </select>
                    </div>
                    <button onclick="saveJob()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all mt-4 italic">Buchen & Sichern</button>
                </div>
            </div>
            <div id="job-list" class="space-y-3 pb-24 text-left"></div>
        </section>

    </div>

    <!-- NAVBAR -->
    <nav class="nav-bar shadow-2xl">
        <button onclick="nav('dash', this)" class="nav-item active">
            <span class="text-lg">📊</span><span>Stats</span>
        </button>
        <button onclick="nav('radar', this)" class="nav-item">
            <span class="text-lg">📡</span><span>Radar</span>
        </button>
        <button onclick="nav('jobs', this)" class="nav-item">
            <span class="text-lg">➕</span><span>Job</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, arrayUnion, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // FIREBASE INITIALISIERUNG
        const firebaseConfig = {
            apiKey: "AIzaSyCs9tX498OaT9lO1i1tXp_6k-g3uS2XqE",
            authDomain: "kjani-6a706.firebaseapp.com",
            projectId: "kjani-6a706",
            storageBucket: "kjani-6a706.appspot.com",
            messagingSenderId: "62503034041",
            appId: "1:62503034041:web:8e1697660c1d2e2b3f46a5"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appKey = 'kjani-master-final-v9';

        let userId = null;
        let stats = { own: 0, prov: 0, logs: [] };
        let privacy = false;

        // AUTH & CLOUD SYNC
        onAuthStateChanged(auth, user => {
            if(user) { 
                userId = user.uid; 
                startSync(); 
            } else { 
                signInAnonymously(auth); 
            }
        });

        function startSync() {
            // Dashboard Sync
            onSnapshot(doc(db, 'artifacts', appKey, 'users', userId, 'dash', 'main'), snap => {
                stats = snap.exists() ? snap.data() : { own: 0, prov: 0, logs: [] };
                renderUI();
                document.getElementById('loader').style.display = 'none';
            }, () => document.getElementById('loader').style.display = 'none');

            // Jobs Collection Sync
            onSnapshot(collection(db, 'artifacts', appKey, 'users', userId, 'jobs'), snap => {
                const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderJobs(list);
                calculateTotals(list);
            });
        }

        async function calculateTotals(list) {
            let o = 0, p = 0;
            list.forEach(j => { if(j.type === 'own') o += Number(j.val); else p += (Number(j.val) * 0.3); });
            await setDoc(doc(db, 'artifacts', appKey, 'users', userId, 'dash', 'main'), { ...stats, own: o, prov: p }, { merge: true });
        }

        function renderUI() {
            const total = (stats.own || 0) + (stats.prov || 0);
            document.getElementById('ui-total').innerText = privacy ? "••••,•• €" : total.toLocaleString('de-DE', {minimumFractionDigits: 2}) + " €";
            document.getElementById('ui-own').innerText = privacy ? "••• €" : (stats.own || 0).toLocaleString('de-DE') + " €";
            document.getElementById('ui-prov').innerText = privacy ? "••• €" : (stats.prov || 0).toLocaleString('de-DE') + " €";
            document.getElementById('log-container').innerHTML = (stats.logs || []).slice(-3).reverse().map(l => `<div class="glass-panel p-4 text-[9px] font-bold text-slate-500 border-none shadow-none text-center">⚡ ${l}</div>`).join('');
        }

        function renderJobs(jobs) {
            const container = document.getElementById('job-list');
            if(jobs.length === 0) { container.innerHTML = '<p class="text-center py-24 opacity-20 text-[10px] font-black uppercase text-center text-center">Noch keine Daten in Cloud</p>'; return; }
            container.innerHTML = jobs.reverse().map(j => `<div class="job-card flex justify-between items-center"><div class="text-left text-left"><p class="font-bold text-sm text-left text-left">${j.name}</p><p class="text-[9px] opacity-40 uppercase font-black text-left text-left">${j.loc || 'Hannover'}</p></div><div class="text-right text-right"><p class="text-emerald-500 font-bold text-lg text-right text-right">${j.val}€</p><button onclick="window.delJob('${j.id}')" class="text-[8px] text-red-500/50 uppercase font-black mt-1 text-right text-right">Löschen</button></div></div>`).join('');
        }

        // NAVIGATION
        window.nav = (id, el) => {
            ['p-dash', 'p-radar', 'p-jobs'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById('p-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };

        window.scanForJobs = () => {
            const btn = document.getElementById('scan-btn');
            btn.innerText = "Scanner läuft...";
            btn.disabled = true;
            setTimeout(() => {
                const results = [
                    { name: "Hausflur-Reinigung", loc: "Hannover-List", val: 580 },
                    { name: "Fensterputzen Büro", loc: "Nordstadt", val: 890 },
                    { name: "Gartenpflege", loc: "Linden-Süd", val: 1250 }
                ];
                document.getElementById('radar-results').innerHTML = '<p class="text-[9px] font-black text-blue-500 mb-4 uppercase ml-1">KI-Treffer gefunden:</p>' + 
                results.map(r => `
                    <div class="job-card border-l-blue-600 flex justify-between items-center bg-blue-950/20">
                        <div class="text-left"><p class="font-bold text-sm text-left text-left">${r.name}</p><p class="text-[9px] opacity-40 text-left text-left">${r.loc}</p></div>
                        <button onclick="window.bookFromRadar('${r.name}', '${r.loc}', ${r.val})" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Sichern</button>
                    </div>
                `).join('');
                btn.innerText = "Scan abgeschlossen";
                btn.disabled = false;
            }, 2000);
        };

        window.bookFromRadar = (name, loc, val) => {
            document.getElementById('in-name').value = name;
            document.getElementById('in-loc').value = loc;
            document.getElementById('in-val').value = val;
            window.nav('jobs', document.querySelectorAll('.nav-item')[2]);
        };

        window.saveJob = async () => {
            const n = document.getElementById('in-name').value, l = document.getElementById('in-loc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-type').value;
            if(!n || !v) return;
            await setDoc(doc(collection(db, 'artifacts', appKey, 'users', userId, 'jobs')), { name:n, loc:l, val:Number(v), type:t, date: new Date().toISOString() });
            await updateDoc(doc(db, 'artifacts', appKey, 'users', userId, 'dash', 'main'), { logs: arrayUnion(`${n}: ${v}€`) });
            ['in-name','in-loc','in-val'].forEach(i => document.getElementById(i).value='');
            window.nav('dash', document.querySelectorAll('.nav-item')[0]);
        };

        window.delJob = async id => { await deleteDoc(doc(db, 'artifacts', appKey, 'users', userId, 'jobs', id)); };
        window.togglePrivacy = () => { privacy = !privacy; renderUI(); };
    </script>
</body>
</html>
