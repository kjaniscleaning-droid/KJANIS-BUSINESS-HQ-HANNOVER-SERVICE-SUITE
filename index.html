<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJANI RADAR PRO</title>
    <style>
        :root {
            --bg: #05070a;
            --blue: #3b82f6;
            --card: #111827;
            --text: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .header { text-align: center; margin: 40px 0; }
        h1 { color: var(--blue); font-size: clamp(24px, 8vw, 36px); font-weight: 900; font-style: italic; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 10px; letter-spacing: 4px; color: #4b5563; text-transform: uppercase; margin-top: 5px; }
        .main-card {
            background: var(--card);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .scan-btn {
            background: var(--blue);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
            -webkit-appearance: none;
            transition: background 0.2s;
        }
        .scan-btn:active { transform: scale(0.98); background: #2563eb; }
        .scan-btn:disabled { background: #1e293b; color: #475569; }
        
        #results {
            margin-top: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            display: none;
            text-align: left;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255,255,255,0.05);
            white-space: pre-wrap;
            color: #cbd5e1;
        }
        .loader {
            display: none;
            margin-top: 15px;
            color: var(--blue);
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>KJANI RADAR</h1>
        <div class="subtitle">Sektor Hannover</div>
    </div>

    <div class="main-card">
        <button id="scanBtn" class="scan-btn" onclick="startScan()">Radar Starten</button>
        <div id="loader" class="loader">Scanner wird kalibriert...</div>
        <div id="results"></div>
    </div>

    <script>
        async function startScan() {
            const btn = document.getElementById('scanBtn');
            const loader = document.getElementById('loader');
            const out = document.getElementById('results');
            // API Schlüssel für Hannover Scanner
            const apiKey = "AIzaSyC9ZXRbkyoXTBeYtO8JaV78Uw-fPZQ92rU";

            btn.disabled = true;
            btn.innerText = "SCAN LÄUFT...";
            loader.style.display = "block";
            out.style.display = "none";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Nenne 5 echte Reinigungsaufträge, Firmen oder aktuelle Ausschreibungen in Hannover. Bitte mit Stadtteil, Art der Reinigung (z.B. Büro, Glas, Bau) und Name der Firma oder Ansprechpartner."
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Radar gestört. Bitte versuche es in einer Minute nochmal.";
                
                out.innerText = text;
                out.style.display = "block";
            } catch (err) {
                out.innerText = "VERBINDUNGSFEHLER: Check dein Internet, Boss!";
                out.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerText = "Radar Starten";
                loader.style.display = "none";
            }
        }
    </script>

</body>
</html>
