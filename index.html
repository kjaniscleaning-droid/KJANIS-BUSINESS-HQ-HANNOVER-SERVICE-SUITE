<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ilirya Business System PRO</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.dark {
  background: #0f172a;
  color: white;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.dark .card {
  background: #1e293b;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: linear-gradient(to right,#1e3c72,#d4af37);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}

.item {
  padding: 10px;
  margin-top:10px;
  border-radius:8px;
  background:#eef2f7;
}

.dark .item {
  background:#334155;
}

.header {
  text-align: center;
}

</style>
</head>

<body>

<div class="header">
<h2>🦅 Ilirya Business System</h2>
<button onclick="toggleMode()">💡 Licht an / aus</button>
</div>

<div class="card">
<h3>🔍 Kunden finden</h3>
<button onclick="search('Hausverwaltung Hannover')">Hausverwaltung</button>
<button onclick="search('Immobilien Hannover')">Immobilien</button>
<button onclick="search('Büro Hannover')">Büros</button>
<button onclick="search('Arztpraxis Hannover')">Praxen</button>
</div>

<div class="card">
<h3>📩 Firma anschreiben</h3>

<input id="firma" placeholder="Firma">
<input id="email" placeholder="E-Mail">

<button onclick="generate()">🔥 Angebot erstellen</button>

<textarea id="text" rows="10"></textarea>

<button onclick="sendMail()">📧 Email öffnen</button>
<button onclick="saveFirma()">💾 Speichern</button>
<button onclick="resetAll()">🧹 Alles löschen</button>

</div>

<div class="card">
<h3>📊 Übersicht</h3>
<div id="liste"></div>
</div>

<div class="card">
<h3>🤖 Antwort Hilfe</h3>
<input id="frage" placeholder="Frage">
<button onclick="generateAnswer()">Antwort erstellen</button>
<textarea id="antwort"></textarea>
</div>

<script>

function toggleMode() {
  document.body.classList.toggle("dark");
}

function search(q){
  window.open("https://www.google.com/search?q=" + encodeURIComponent(q));
}

// sichere Daten
let firmen = [];

try {
  firmen = JSON.parse(localStorage.getItem("firmen")) || [];
} catch {
  localStorage.clear();
  firmen = [];
}

// Nachricht
function generate(){
  let firma = document.getElementById("firma").value;

  if(!firma){
    alert("Firma fehlt!");
    return;
  }

  let text = `Betreff: Zusammenarbeit im Bereich Reinigung

Guten Tag ${firma},

mein Name ist Kjani Zharki, Inhaber von Kjanis Cleaning aus Hannover.

Ich unterstütze Unternehmen zuverlässig bei Treppenhaus-, Büro- und Unterhaltsreinigung.

Aktuell habe ich freie Kapazitäten und kann kurzfristig starten.

Ich arbeite sauber, zuverlässig und lege großen Wert auf Qualität.

📞 +49 152 15787871

Ich freue mich auf Ihre Rückmeldung.

Mit freundlichen Grüßen  
Kjani Zharki`;

  document.getElementById("text").value = text;
}

// Email
function sendMail(){
  let email = document.getElementById("email").value;
  let body = document.getElementById("text").value;

  window.location.href =
  "mailto:" + email +
  "?subject=Reinigung Angebot&body=" +
  encodeURIComponent(body);
}

// speichern
function saveFirma(){
  let name = document.getElementById("firma").value;
  let email = document.getElementById("email").value;

  if(!name) return;

  firmen.push({
    name,
    email,
    status: "Gesendet",
    date: Date.now()
  });

  localStorage.setItem("firmen", JSON.stringify(firmen));
  render();
}

// anzeigen
function render(){
  let box = document.getElementById("liste");
  box.innerHTML = "";

  firmen.forEach((f,i)=>{

    let days = (Date.now() - f.date)/(1000*60*60*24);
    let reminder = days >= 2 ? "⚠️ Nachfassen!" : "";

    box.innerHTML += `
    <div class="item">
    <b>${f.name}</b><br>
    ${f.email}<br>
    Status: ${f.status} ${reminder}
    <br>
    <button onclick="setDone(${i})">Antwort</button>
    <button onclick="remove(${i})">❌ Löschen</button>
    </div>`;
  });
}

// status
function setDone(i){
  firmen[i].status = "Antwort";
  localStorage.setItem("firmen", JSON.stringify(firmen));
  render();
}

// löschen
function remove(i){
  firmen.splice(i,1);
  localStorage.setItem("firmen", JSON.stringify(firmen));
  render();
}

// reset
function resetAll(){
  if(confirm("Alles löschen?")){
    localStorage.clear();
    firmen = [];
    render();
  }
}

// antwort
function generateAnswer(){
  let f = document.getElementById("frage").value.toLowerCase();
  let t = "";

  if(f.includes("preis")){
    t = "Die Kosten hängen vom Objekt ab. Gerne mache ich Ihnen ein Angebot.";
  }
  else if(f.includes("wann")){
    t = "Ich kann kurzfristig starten.";
  }
  else{
    t = "Vielen Dank für Ihre Nachricht. Gerne bespreche ich alles persönlich.";
  }

  document.getElementById("antwort").value = t;
}

render();

</script>

</body>
</html>
